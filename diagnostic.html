<script>
const questions = [
  { key: "roles", q: "How many roles are you hiring for right now?", options: ["1–2","3–5","6+"] },
  { key: "speed", q: "How fast do you need to fill them?", options: ["< 2 weeks","2–4 weeks","1–2 months","Flexible"] },
  { key: "founder", q: "Are you founder-led in hiring today?", options: ["Yes","Partially","No"] },
  { key: "pipeline", q: "How many candidates reach interview stage weekly?", options: ["0–2","3–5","6–10","10+"] },
  { key: "source", q: "Where do most candidates come from?", options: ["Inbound","Referrals","Outbound","Recruiters","Founder sourcing"] },
  { key: "bottleneck", q: "What slows hiring most today?", options: ["Sourcing","Outreach follow-up","Scheduling","Candidate quality","Decision-making speed"] },
  { key: "delay", q: "How often do strong candidates slip due to delays?", options: ["Often","Sometimes","Rarely","Never"] },
  { key: "hours", q: "How many hours/week are you spending on hiring?", options: ["<5","5–10","10–20","20+"] },
  { key: "ownership", q: "What are you still doing yourself?", options: ["Sourcing","Outreach","Screening","Final interviews","All of the above"] },
  { key: "alignment", q: "Does your team evaluate candidates consistently?", options: ["Yes","Somewhat","No"] }
];

let answers = {};
let current = 0;

function startDiagnostic() {
  document.querySelector("button").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  if (current >= questions.length) {
    showEmailGate();
    return;
  }

  const q = questions[current];
  const title = document.createElement("h3");
  title.innerText = q.q;
  quiz.appendChild(title);

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => {
      answers[q.key] = opt;
      current++;
      showQuestion();
    };
    quiz.appendChild(btn);
  });
}

function showEmailGate() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = `
    <h3>Get your breakdown</h3>
    <input id="email" type="email" placeholder="you@company.com" />
    <button onclick="submitEmail()">See results</button>
  `;
}

function submitEmail() {
  const email = document.getElementById("email").value;

  if (!email || !email.includes("@")) {
    alert("Enter a valid email");
    return;
  }

  answers.email = email;

  console.log("Lead captured:", answers);

  calculateResult();
}

function calculateResult() {
  document.getElementById("quiz").style.display = "none";
  const result = document.getElementById("result");
  result.style.display = "block";

  let scores = { founder: 0, pipeline: 0, outreach: 0, decision: 0 };

  if (answers.founder === "Yes") scores.founder += 3;
  if (answers.hours === "20+") scores.founder += 3;
  if (answers.ownership === "All of the above") scores.founder += 4;
  if (answers.delay === "Often") scores.founder += 2;

  if (answers.source === "Inbound") scores.pipeline += 3;
  if (answers.bottleneck === "Candidate quality") scores.pipeline += 4;

  if (answers.source === "Outbound" || answers.source === "Founder sourcing") scores.outreach += 3;
  if (answers.bottleneck === "Outreach follow-up") scores.outreach += 4;

  if (answers.bottleneck === "Decision-making speed") scores.decision += 4;
  if (answers.delay === "Often") scores.decision += 3;

  if (answers.alignment === "No") scores.decision += 4;
  if (answers.alignment === "Somewhat") scores.decision += 2;

  let type = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  const outputs = {
    founder: `<h3>🟥 Founder Bottleneck</h3><p>You are the constraint.</p>`,
    pipeline: `<h3>🟧 Pipeline Noise</h3><p>You’re evaluating the wrong signals.</p>`,
    outreach: `<h3>🟨 Outreach Breakdown</h3><p>Your outreach isn’t landing.</p>`,
    decision: `<h3>🟦 Decision Drag</h3><p>Your team isn’t aligned.</p>`
  };

  result.innerHTML = outputs[type] + `<br><button onclick="window.location.href='/'">Back</button>`;
}
</script>
