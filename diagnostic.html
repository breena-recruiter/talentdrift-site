<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hiring Diagnostic — Talent Drift</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f3ed;
      --panel: rgba(255,255,255,0.56);
      --line: rgba(26,22,18,0.08);
      --text: #181410;
      --muted: #6e6259;
      --accent: #b08a4a;
      --deep: #27312d;
      --radius: 20px;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(1100px, calc(100% - 40px));
      margin: auto;
    }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: rgba(247,243,237,0.85);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Lora', serif;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      position: relative;
    }

    .brand-mark span {
      position: absolute;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #d3b172, #a47c3d);
      border-radius: 999px;
    }

    .brand-mark span:nth-child(1){left:2px;height:10px;opacity:.5;}
    .brand-mark span:nth-child(2){left:10px;height:16px;}
    .brand-mark span:nth-child(3){left:18px;height:24px;}
    .brand-mark span:nth-child(4){left:26px;height:14px;opacity:.6;}

    .nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
    }

    /* HERO */
    .hero {
      padding: 80px 0 40px;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      max-width: 500px;
      line-height: 1.7;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: var(--deep);
      color: white;
      cursor: pointer;
    }

    #quiz, #result {
      margin-top: 40px;
      background: var(--panel);
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
    }

    #quiz button {
      display: block;
      width: 100%;
      margin: 10px 0;
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="container nav-inner">
    <div class="brand">
      <div class="brand-mark">
        <span></span><span></span><span></span><span></span>
      </div>
      Talent Drift
    </div>
    <div>
      <a href="/">Home</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Hiring bottleneck diagnostic</h1>
    <p>
      Founder-led hiring works — until it doesn’t.  
      This shows you where it breaks.
    </p>

    <button onclick="startDiagnostic()">Start diagnostic</button>

    <div id="quiz" style="display:none;"></div>
    <div id="result" style="display:none;"></div>
  </div>
</section>

<!-- SCRIPT -->
<script>
/* KEEP YOUR EXISTING SCRIPT EXACTLY AS IS BELOW THIS LINE */
</script>

</body>
</html>
